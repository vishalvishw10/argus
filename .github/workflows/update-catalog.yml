name: Update CVE Catalog

# Keeps the full NVD-backed CVE catalog (public/data/cve/*.json) current.
# Hourly: pulls CVEs modified in the last ~70 minutes (incremental, fast).
# Manual: backfill a whole year or range.
on:
  schedule:
    - cron: '40 * * * *' # hourly, staggered after data(:00) and trending(:20)
  workflow_dispatch:
    inputs:
      from:
        description: 'Backfill: start year (e.g. 2010)'
        required: false
        default: ''
      to:
        description: 'Backfill: end year (e.g. 2026)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: catalog-write # shared with backfill-catalog so cve/ writes serialize
  cancel-in-progress: false

jobs:
  catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update catalog
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }} # strongly recommended (50 vs 5 req/30s)
        run: |
          if [ -n "${{ github.event.inputs.from }}" ]; then
            node scripts/cves.mjs --from ${{ github.event.inputs.from }} --to ${{ github.event.inputs.to || github.event.inputs.from }}
          else
            # incremental: CVEs modified since ~70 min ago (overlap covers run jitter)
            SINCE=$(date -u -d '70 minutes ago' +'%Y-%m-%dT%H:%M:%S.000')
            node scripts/cves.mjs --since "$SINCE"
          fi

      - name: Commit & push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/cve
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "catalog: refresh CVE catalog ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git pull --rebase --autostash origin main || true
            git push
          fi
