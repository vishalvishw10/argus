name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - '.github/workflows/deploy-pages.yml'
  # The data jobs push with GITHUB_TOKEN, and token-authored pushes DON'T trigger
  # other workflows — so redeploy after each data workflow finishes instead.
  workflow_run:
    workflows:
      - 'Update CVE Data'
      - 'Update Trending Intelligence'
      - 'Update CVE Catalog'
      - 'Backfill CVE Catalog'
    types: [completed]
  # hourly backstop in case a workflow_run event is missed
  schedule:
    - cron: '50 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      # Custom domain (argus.rootxvishal.com) serves at the root, so base = '/'.
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
