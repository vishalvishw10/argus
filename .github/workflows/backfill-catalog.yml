name: Backfill CVE Catalog

# One-time historical backfill that works WITHOUT an NVD API key.
# Anonymous NVD is slow (5 req/30s), so a full multi-year pull can't finish in
# one job. This processes the newest still-missing year per run and idles once
# the whole catalog (2010 → current year) exists. Runs every 3 hours until done.
on:
  schedule:
    - cron: '15 */3 * * *'
  workflow_dispatch:
    inputs:
      year:
        description: 'Force a specific year (blank = newest missing year)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: catalog-write # share with update-catalog so they never write at once
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # big recent years take a while anonymously
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pick target year & ingest
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }} # optional; runs anonymously if unset
        run: |
          set -e
          YEAR="${{ github.event.inputs.year }}"
          if [ -z "$YEAR" ]; then
            CUR=$(date -u +%Y)
            for y in $(seq "$CUR" -1 2010); do
              if [ ! -f "public/data/cve/$y.json" ]; then YEAR="$y"; break; fi
            done
          fi
          if [ -z "$YEAR" ]; then
            echo "Catalog complete (2010-$(date -u +%Y) all present). Nothing to backfill."
            exit 0
          fi
          echo "Backfilling year $YEAR…"
          node scripts/cves.mjs --year "$YEAR"

      - name: Commit & push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/cve
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "catalog: backfill year ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git pull --rebase --autostash origin main || true
            git push
          fi
